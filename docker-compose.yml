services:
  instagram-mcp-proxy:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.instagram-mcp-proxy.rule=Host(`instagram-mcp-proxy.timothykosakoy.com`)"
      - "traefik.http.routers.instagram-mcp-proxy.entrypoints=websecure"
      - "traefik.http.routers.instagram-mcp-proxy.tls.certresolver=letsencrypt"
      - "traefik.http.services.instagram-mcp-proxy.loadbalancer.server.port=8001"

networks:
  dokploy-network:
    external: true